    <line x1="88" y1="213.27999999999997" x2="1512" y2="213.27999999999997" stroke="#d7b98a" stroke-width="2"/>
    <text x="88" y="263.28" font-size="34" font-weight="500" fill="#1f2933">后来 后来Klook搞了一个活动：订酒店送关西乐享周游券！我猜是公司囤的券太多了？最Bug一点</text>
<text x="88" y="311.55999999999995" font-size="34" font-weight="500" fill="#1f2933">是订完酒店券到手后很多人立马取订，白嫖！在某鱼最低时三四十元就能买到一份，可能是有史以</text>
<text x="88" y="359.84" font-size="34" font-weight="500" fill="#1f2933">来最便宜的时候。 北海道周游券 而另一张折扣非常大的周游券是北海道周游券（见最后一张图）</text>
<text x="88" y="408.12" font-size="34" font-weight="500" fill="#1f2933">，博主记得不到100元/份，可以兑换旭川动物园门票、定山溪一日游、天狗山缆车等等，随便兑</text>
<text x="88" y="456.4" font-size="34" font-weight="500" fill="#1f2933">换一个就回本，相当于买一送二。 P1→3 当时送的大阪地铁券，兑换还送明信片 P4、5 去年上线</text>
<text x="88" y="504.67999999999995" font-size="34" font-weight="500" fill="#1f2933">时折扣力度非常大，还有新人优惠或者反现12% P6 天王寺MIO可以兑换3张500日元代金券，官</text>
<text x="88" y="552.96" font-size="34" font-weight="500" fill="#1f2933">方说的一次只能用1张，但是好多店铺并没有培训到位，可以叠加。 P7 京都站大楼商场食肆几乎</text>
<text x="88" y="601.24" font-size="34" font-weight="500" fill="#1f2933">都能用的1500日元代金券，特别好用！</text>
