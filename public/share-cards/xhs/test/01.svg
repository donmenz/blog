<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1242" height="1660" viewBox="0 0 1242 1660">
  <rect width="100%" height="100%" fill="#f7efe3"/>
  <rect x="48" y="48" width="1146" height="1564" rx="34" fill="#fffaf1" stroke="#d7b98a" stroke-width="3"/>
  <circle cx="1122" cy="113.28" r="48" fill="#d9462f" opacity="0.92"/>
  <circle cx="1069.2" cy="105.60000000000001" r="18" fill="#2f6f73" opacity="0.9"/>
  <g font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Noto Sans CJK SC', sans-serif">
    <text x="96" y="96" font-size="26" font-weight="700" fill="#2f6f73" letter-spacing="0">小红书分享卡</text>
    <text x="96" y="168" font-size="58" font-weight="800" fill="#20201d">test</text>
    <line x1="96" y1="221.27999999999997" x2="1146" y2="221.27999999999997" stroke="#d7b98a" stroke-width="2"/>
    <text x="96" y="271.28" font-size="38" font-weight="500" fill="#1f2933">首先 去年项目刚上线的时候，折扣很大，70元左右一份还送大</text>
<text x="96" y="329.03999999999996" font-size="38" font-weight="500" fill="#1f2933">阪地铁一日券，后者怎么着也要30来块。而一份周游券最大可</text>
<text x="96" y="386.79999999999995" font-size="38" font-weight="500" fill="#1f2933">以兑换出高达价值250元的服务，也引来一些套利“砍树人”，有</text>
<text x="96" y="444.55999999999995" font-size="38" font-weight="500" fill="#1f2933">些人买几十份，兑换商场代金券叠加买东西套利，后来许多购物</text>
<text x="96" y="502.31999999999994" font-size="38" font-weight="500" fill="#1f2933">券接待点就限制兑换，不得不说，这些人还是“聪明”。</text>
<text x="96" y="588.0799999999999" font-size="38" font-weight="500" fill="#1f2933">后来 后来Klook搞了一个活动：订酒店送关西乐享周游券！我</text>
<text x="96" y="645.8399999999999" font-size="38" font-weight="500" fill="#1f2933">猜是公司囤的券太多了？最Bug一点是订完酒店券到手后很多人</text>
<text x="96" y="703.5999999999999" font-size="38" font-weight="500" fill="#1f2933">立马取订，白嫖！在某鱼最低时三四十元就能买到一份，可能是</text>
<text x="96" y="761.3599999999999" font-size="38" font-weight="500" fill="#1f2933">有史以来最便宜的时候。 北海道周游券 而另一张折扣非常大的</text>
<text x="96" y="819.1199999999999" font-size="38" font-weight="500" fill="#1f2933">周游券是北海道周游券（见最后一张图），博主记得不到100元</text>
<text x="96" y="876.8799999999999" font-size="38" font-weight="500" fill="#1f2933">/份，可以兑换旭川动物园门票、定山溪一日游、天狗山缆车等</text>
<text x="96" y="934.6399999999999" font-size="38" font-weight="500" fill="#1f2933">等，随便兑换一个就回本，相当于买一送二。 P1→3 当时送的</text>
<text x="96" y="992.3999999999999" font-size="38" font-weight="500" fill="#1f2933">大阪地铁券，兑换还送明信片 P4、5 去年上线时折扣力度非常</text>
<text x="96" y="1050.1599999999999" font-size="38" font-weight="500" fill="#1f2933">大，还有新人优惠或者反现12% P6 天王寺MIO可以兑换3张50</text>
<text x="96" y="1107.92" font-size="38" font-weight="500" fill="#1f2933">0日元代金券，官方说的一次只能用1张，但是好多店铺并没有</text>
<text x="96" y="1165.6799999999998" font-size="38" font-weight="500" fill="#1f2933">培训到位，可以叠加。 P7 京都站大楼商场食肆几乎都能用的1</text>
<text x="96" y="1223.44" font-size="38" font-weight="500" fill="#1f2933">500日元代金券，特别好用！</text>
    <text x="96" y="1572" font-size="25" font-weight="650" fill="#8a6042">@dongxi.voyage</text>
    <text x="96" y="1532" font-size="22" fill="#9a7a5f">2026-07-07 · travel / 日本旅行 / 北海道 / 关西</text>
    <text x="1146" y="1572" font-size="25" font-weight="700" text-anchor="end" fill="#8a6042">01 / 02</text>
  </g>
</svg>
